spring:
  ai:
    ollama:
      base-url: http://localhost:11434
      chat:
        model: llama3
        options:
          temperature: 0.1
          top-p: 0.9
          max-tokens: 1000
      embedding:
        model: llama3
  application:
    name: rag-project

# RAG 문서 폴더 설정
rag:
  documents:
    folder: ${RAG_DOCUMENTS_FOLDER:documents}

server:
  port: 8080

logging:
  level:
    '[com.example.rag_project]': DEBUG
    '[org.springframework.ai]': DEBUG
