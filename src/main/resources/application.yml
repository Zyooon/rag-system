spring:
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true
  ai:
    ollama:
      base-url: http://localhost:11434
      chat:
        model: llama3
        options:
          temperature: 0.1
          top-p: 0.9
          max-tokens: 1000
      embedding:
        model: bge-m3
  application:
    name: rag-project
  # Redis 설정 (향후 RedisVectorStore 사용 시)
  data:
    redis:
      host: localhost
      port: 6379
      # password: 1234  # Redis Stack Server는 비밀번호 없음
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0

# RAG 문서 폴더 설정
rag:
  documents:
    folder: ${RAG_DOCUMENTS_FOLDER:documents}
  search:
    threshold: 0.3
    max-results: 5
  vectorstore:
    type: redis  # RedisVectorStore 사용

server:
  port: 8080

logging:
  level:
    '[com.example.rag_project]': DEBUG
    '[org.springframework.ai]': DEBUG
